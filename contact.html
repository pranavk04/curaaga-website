<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact CU Raaga</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Custom JavaScript -->
    <script src="js/index.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/contact.css" />
  </head>

  <body>
    <header class="header">
      <nav class="navbar">
        <a href="team.html" class="nav-link">TEAM</a>
        <a href="about.html" class="nav-link">ABOUT US</a>
        <a href="index.html" class="logo-link">
          <img src="img/index/logo.PNG" alt="Logo" class="logo" />
        </a>
        <a href="contact.html" class="nav-link">CONTACT</a>
        <a href="help.html" class="nav-link">HELP US</a>
      </nav>
    </header>

    <div
      class="container d-flex align-items-center justify-content-center vh-100"
    >
      <div
        class="bg-white p-4 rounded-lg shadow-md mb-8"
        style="
          width: 100vmin;
          text-align: center;
          color: #ff8000;
          background-color: rgba(255, 255, 255, 0.8);
          border: 2px solid #ff8000;
          transition: transform 0.3s;
        "
      >
        <h2
          class="text-2xl md:text-3xl font-semibold mb-4 font-serif text-primary"
          style="color: #ff8000"
        >
          CU Raaga Mailing List
        </h2>
        <p class="text-lg text-neutral-700 font-sans mb-4">
          We're excited that you're interested in joining CU Raaga! Please fill
          out the form below to get onto our mailing list.
        </p>

        <div id="mc_embed_signup">
          <form
            action="https://curaaga.us22.list-manage.com/subscribe/post?u=f14679df73abffe4eeb588004&amp;id=c69191fc56&amp;f_id=0089d6e1f0"
            method="post"
            id="mc-embedded-subscribe-form"
            name="mc-embedded-subscribe-form"
            class="validate"
            target="_blank"
          >
            <div id="mc_embed_signup_scroll">
              <h2 class="text-xl font-semibold text-secondary">Subscribe</h2>
              <div class="mc-field-group">
                <label
                  class="block text-gray-700 text-sm font-bold mb-2"
                  for="mce-EMAIL"
                  >Email Address <span class="asterisk">*</span></label
                >
                <input
                  type="email"
                  name="EMAIL"
                  class="required email shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                  id="mce-EMAIL"
                  required=""
                  value=""
                />
              </div>
              <div id="mce-responses" class="clear foot">
                <div
                  class="response"
                  id="mce-error-response"
                  style="display: none"
                ></div>
                <div
                  class="response"
                  id="mce-success-response"
                  style="display: none"
                ></div>
              </div>
              <div aria-hidden="true" style="position: absolute; left: -5000px">
                <input
                  type="text"
                  name="b_f14679df73abffe4eeb588004_c69191fc56"
                  tabindex="-1"
                  value=""
                />
              </div>
              <input
                type="submit"
                name="subscribe"
                id="mc-embedded-subscribe"
                class="bg-secondary hover:bg-primary text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                value="Subscribe"
                style="margin-top: 15px; cursor: pointer"
              />
            </div>
          </form>
        </div>
        <script
          type="text/javascript"
          src="//s3.amazonaws.com/downloads.mailchimp.com/js/mc-validate.js"
        ></script>
      </div>
    </div>

    <!-- mandala right left-->
    <div class="container">
      <img
        src="img/index/mandala_side.png"
        alt="Mandala Left"
        class="mandala-left"
      />
      <img
        src="img/index/mandala_side.png"
        alt="Mandala Right"
        class="mandala-right"
      />
    </div>

    <!-- Bootstrap Bundle JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
