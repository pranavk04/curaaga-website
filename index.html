<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CU Raaga</title>

        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <!-- Custom JavaScript -->
        <script src="js/index.js"></script>

        <!-- Custom CSS -->
        <link rel="stylesheet" href="CSS/index.css" />
    </head>

    <body>
        <header class="header">
            <nav class="navbar">
                <a href="team.html" class="nav-link">TEAM</a>
                <a href="about.html" class="nav-link">ABOUT US</a>
                <!-- Centered Image Link -->
                <a href="index.html" class="logo-link">
                    <img src="img/index/logo.PNG" alt="Logo" class="logo" />
                </a>
                <a href="contact.html" class="nav-link">CONTACT</a>
                <a href="help.html" class="nav-link">HELP US</a>
                <!-- Font Awesome for icons -->
                <link
                    rel="stylesheet"
                    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
                    integrity="sha384-k6RqeWeci5ZR/Lv4MR0sA0FfDOMfOQyM+Opz0qTW+4nYipxL/ymHq1KDHU/KyFe9"
                    crossorigin="anonymous"
                />
            </nav>
        </header>

        <!-- mandala and logo content -->
        <div class="container">
            <div class="center-mandala">
                <img
                    src="img/index/mandala_center.png"
                    alt="Mandala Center"
                    class="mandala-center"
                />
                <img
                    src="img/index/logo.svg"
                    alt="CU Raaga Logo"
                    class="cu-logo"
                />
            </div>
            <img
                src="img/index/mandala_side.png"
                alt="Mandala Left"
                class="mandala-left"
            />
            <img
                src="img/index/mandala_side.png"
                alt="Mandala Right"
                class="mandala-right"
            />
        </div>

        <!-- Mission Section -->
        <section class="mission-section">
            <h2 class="mission-title">Our Mission</h2>
            <p class="mission-text">
                CU Raaga is dedicated to fostering appreciation for South Asian
                classical music at Columbia University. We offer a space to
                explore Carnatic and Hindustani styles, connect with like-minded
                peers, and inspire new understandings of traditional art forms.
            </p>
        </section>

        <canvas id="waveform" width="800" height="200"></canvas>
        <script src="index.js"></script>

        <!-- Bootstrap Bundle JS -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
        ></script>
